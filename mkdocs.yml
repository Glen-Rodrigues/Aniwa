site_name: Aniwa
site_description: Universal dataset profiling and intelligence tool.
site_author: Reginald Erzoah
repo_url: https://github.com/ReginaldErzoah/Aniwa
repo_name: ReginaldErzoah/Aniwa

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Philosophy: philosophy.md
  - Roadmap: roadmap.md

  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Usage: getting-started/usage.md
      - Configuration: getting-started/configuration.md
      - Examples: getting-started/examples.md

  - Developer Guide:
      - Architecture: developer-guide/architecture.md
      - Profiling Engine: developer-guide/profiling-engine.md
      - File Readers: developer-guide/file-readers.md
      - Reporting System: developer-guide/reporting-system.md
      - Template Engine: developer-guide/template-engine.md
      - Adding File Readers: developer-guide/adding-file-readers.md
      - Adding Report Formats: developer-guide/adding-report-formats.md
      - Adding Report Templates: developer-guide/adding-report-templates.md
      - Adding Insights: developer-guide/adding-insights.md
      - Local Development: developer-guide/local-development.md
      - Testing: developer-guide/testing.md
      - Code Style: developer-guide/code-style.md
      - Dependency Management: developer-guide/dependency-management.md
      - Release Process: developer-guide/release-process.md

  - Release Notes:
      - Overview: release-notes/index.md
      - v0.1.0: release-notes/v0.1.0.md
      - v0.1.1: release-notes/v0.1.1.md
      - v0.1.2: release-notes/v0.1.2.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - attr_list
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true